types: [incom_ns]

max_output_dimension: 4
train_val_test_ratio: [0.8, 0.1, 0.1]
t_num: 50 # 100 (total length of dataset is 1000 frames)
x_num: 128 # how many to use for model input

mixed_length: 0 # ${.t_num} # 0 means all have same length, otherwise, pad to t_num

random_start: # randomly select the time starting idx
  train: true
  val: false
  test: false
  start_max: 90

# whether to share all channels among equations or use c_mask
tie_fields: 1

sampler:
  uniform: 1
  
  incom_ns: 1

incom_ns:
  folder: /data/shared/dataset/pdebench/2D/NS_incom/converted
  t_step: 1 # 10, dt=0.005
  x_num: 128
  dim: 3
  c_mask: [1, 1, 1, 0, 0, 0]