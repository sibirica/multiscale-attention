name: multiscale_bcat_auto

# shared attributes
n_layer: 6 # 12
dim_emb: 1024 # 512 # fast embedding dimension
slow_dim: ${.dim_emb}
dim_ffn: 2752 # 1376
pool_dim: 2752 # hidden layer size of slow layer encoding ffn
lift_dim: 2752 # hidden layer size of lifting from slow to fast
recombine_dim: 2752 # 4800 # 1408 # hidden layer size of recombined layer decoding ffn
dropout: 0
attn_dropout: 0
n_head: 8
norm_first: true
positional_embedding: null
qk_norm: 1
first_norm: rms # select from [layer, rms]
norm: layer # select from [layer, rms]
activation: swiglu
recombine_activation: swiglu # activation function to use in RecombineDecoder FFN
rotary: 0

flex_attn: 0
kv_cache: 0
rate: 2 # 8
shared_scale_ffn: 0 # if 1, fast/slow streams in each layer use the same FFN weights

log_recombine_norms: 0
log_recombine_norms_mode: always # choose from [inference, always]
log_once: 1

patch_num: 8 #16 # for input, number of patches per dimension
patch_num_output: ${.patch_num} # for output, number of patches per dimension

embedder:
    # choose from [linear, conv, overlap_linear] 
    type: conv
    dim: ${..dim_emb}
    patch_num: ${..patch_num}
    patch_num_output: ${..patch_num_output}

    time_embed: learnable # select from continuous and learnable
    max_time_len: 50 # (switched with length of dataset, previously 20)

    conv_dim: 32
    early_conv: 0

    deep: 0
