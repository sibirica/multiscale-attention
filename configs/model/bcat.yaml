name: bcat_auto

# shared attributes
n_layer: 6
dim_emb: 512
dim_ffn: 1216
dropout: 0
attn_dropout: 0
n_head: 8
norm_first: true
positional_embedding: null
qk_norm: 1
norm: rms # select from [layer, rms]
activation: swiglu
rotary: 0
bias: 1

logit_softcap: 0 # only works with flex_attn=1

flex_attn: 1
act_ckpt: 0 # activation checkpointing
kv_cache: 1

patch_num: 16 # for input, number of patches per dimension
patch_num_output: ${.patch_num} # for output, number of patches per dimension

embedder:
    # choose from [linear, conv, overlap_linear] 
    type: conv
    dim: ${..dim_emb}
    patch_num: ${..patch_num}
    patch_num_output: ${..patch_num_output}

    time_embed: learnable # select from continuous and learnable
    max_time_len: 50

    conv_dim: 32
    early_conv: 0

    deep: 0
