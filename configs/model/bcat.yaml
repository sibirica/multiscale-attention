name: bcat_auto

# shared attributes
n_layer: 6 # 11
dim_emb: 512 # 1024
dim_ffn: 1216 # 2752
dropout: 0
attn_dropout: 0
n_head: 8
norm_first: true
# Residual LN mode: pre | peri | keel
#   pre:  y = x + f(LN(x))
#   peri: y = x + LN(f(LN(x)))
#   keel: y = LN(α·x + f(LN(x)))  (α = keel_alpha)
ln_mode: keel
keel_alpha: 12  # typically 2 * n_layer
positional_embedding: null
qk_norm: 1
norm: rms # select from [layer, rms]
activation: swiglu
rotary: 0
bias: 1

logit_softcap: 0 # only works with flex_attn=1

flex_attn: 1
act_ckpt: 0 # activation checkpointing
kv_cache: 1

embedder:
    type: vae
    dim: ${..dim_emb}

    time_embed: learnable # select from continuous and learnable
    max_time_len: 50

    # For 128x128 frames, ratios 8/16/32 give 16x16, 8x8, and 4x4 token grids.
    compression_ratio: 8
    hidden_dim: 64
    max_hidden_dim: 256
    num_res_blocks: 1
    activation: silu
