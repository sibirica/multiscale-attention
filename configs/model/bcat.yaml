name: bcat_auto

# shared attributes
n_layer: 11
dim_emb: 1024
dim_ffn: 2752
dropout: 0
attn_dropout: 0
n_head: 8
norm_first: true
positional_embedding: null
qk_norm: 1
norm: rms # select from [layer, rms]
activation: swiglu
rotary: 0
bias: 1

logit_softcap: 0 # only works with flex_attn=1

flex_attn: 0
act_ckpt: 0 # activation checkpointing
kv_cache: 1

embedder:
    type: vae
    dim: ${..dim_emb}

    time_embed: learnable
    max_time_len: 20

    # For 128x128 frames, ratios 8/16/32 give 16x16, 8x8, and 4x4 token grids.
    compression_ratio: 8
    hidden_dim: 64
    max_hidden_dim: 256
    num_res_blocks: 1
    activation: silu
