types: [com_ns]

max_output_dimension: 4
train_val_test_ratio: [0.8, 0.1, 0.1]
t_num: 20
x_num: 128 # how many to use for model input

mixed_length: 0 # 0 means all have same length, otherwise, pad to t_num

random_start: # randomly select the time starting idx
  train: true
  val: false
  test: false
  start_max: 40

# whether to share all channels among equations or use c_mask
tie_fields: 1

sampler:
  uniform: 1
  
  # when uniform=1, the following will be ignored. Otherwise, the probabilities will be normalized
  shallow_water: 1
  incom_ns: 2
  com_ns: 1
  incom_ns_arena: 2
  incom_ns_arena_u: 1
  cfdbench: 1

com_ns:
  folders:
    rand: /s1/shared/dataset/pdebench/2D/CFD/2D_Train_Rand
    turb: /s1/shared/dataset/pdebench/2D/CFD/2D_Train_Turb
  type: all
  t_step: 1 # dt=0.05
  x_num: 128
  dim: 4
  c_mask: [1, 1, 0, 1, 1, 0]